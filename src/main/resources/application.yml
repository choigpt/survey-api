# ============================================================
# 설문조사 API - 메인 설정 파일
# ============================================================

spring:
  application:
    name: survey-api

  # ----- 데이터소스 설정 -----
  datasource:
    url: jdbc:mysql://localhost:3306/survey_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ----- JPA/Hibernate 설정 -----
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
